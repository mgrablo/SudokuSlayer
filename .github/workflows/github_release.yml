name: Release on Github

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch: { }

permissions:
    contents: write

jobs:
    test:
        name: Unit Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: 'temurin'
                  java-version: 17

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v6

            - name: Grant execute permissions for gradlew
              run: chmod +x gradlew

            - name: Run unit tests
              run: ./gradlew clean testDebug

    build:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v6


            - name: Make gradlew executable
              run: chmod +x ./gradlew

            - name: Extract version from version catalog
              run: |
                  CATALOG_FILE="gradle/libs.versions.toml"
                  VERSION_NAME=$(grep "appVersionName" $CATALOG_FILE | cut -d'"' -f2)
                  
                  if [ -z "$VERSION_NAME" ]; then
                      echo "::error::Could not extract version name from $CATALOG_FILE."
                      exit 1
                  fi

                  echo "Extracted version: $VERSION_NAME"
                  echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

            - name: Extract changelog
              run: |
                  VERSION="${{env.VERSION_NAME}}"
                  CHANGELOG_FILE="CHANGELOG.md"
                  OUTPUT_FILE="commit.txt"
                  
                  awk -v version="## ${VERSION}" '
                      $0 ~ "^" version "$" {capture=1; next}
                      /^## [0-9]/ && capture {exit}
                      capture {print}
                  ' ${CHANGELOG_FILE} > ${OUTPUT_FILE}
                
                  if [ ! -s "${OUTPUT_FILE}" ]; then
                      echo "::warning file=${CHANGELOG_FILE}::Could not find changelog for version ${VERSION}. commit.txt will be empty."
                  fi
                
                  echo "Changelog extracted to commit.txt"

            - name: Build app bundle
              run: |
                  ./gradlew assembleRelease

            - name: Sign app Apk
              id: sign_app
              uses: r0adkll/sign-android-release@v1
              with:
                  releaseDirectory: app/build/outputs/apk/release/
                  signingKeyBase64: ${{ secrets.SIGNING_KEY }}
                  alias: ${{ secrets.ALIAS }}
                  keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
                  keyPassword: ${{ secrets.KEY_PASSWORD }}
              env:
                BUILD_TOOLS_VERSION: "36.0.0"

            - name: Rename Signed Apk
              run: |
                  SIGNED_APK="${{steps.sign_app.outputs.signedReleaseFile}}"
                  NEW_NAME="SudokuSlayer-v${{env.VERSION_NAME}}.apk"
                  
                  if [ ! -f "$SIGNED_APK" ]; then
                    echo "::error::Signed APK not found at: $SIGNED_APK"
                    exit 1
                  fi
                  
                  mv "$SIGNED_APK" "app/build/outputs/apk/release/$NEW_NAME"
                  
                  if [ ! -f "app/build/outputs/apk/release/$NEW_NAME" ]; then
                    echo "::error::Failed to rename APK"
                    exit 1
                  fi
                  
                  echo "Successfully renamed to: $NEW_NAME"
                  echo "FINAL_APK_PATH=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_ENV

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  make_latest: true
                  files: ${{ env.FINAL_APK_PATH }}
                  body_path: commit.txt
                  name: Release v${{ env.VERSION_NAME }}
                  tag_name: v${{ env.VERSION_NAME }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
