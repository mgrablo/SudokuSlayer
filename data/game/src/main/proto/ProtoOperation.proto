syntax = "proto3";

package io.github.mgrablo.sudokuslayer.data.game;
import "ProtoCell.proto";

option java_multiple_files = true;

message ProtoOperation {
	int64 id = 1;
	repeated ProtoCellChange changes = 2;
}

message ProtoCellChange {
	ProtoCell oldCell = 1;
	ProtoCell newCell = 2;
}

message ProtoOperationHistory {
	repeated ProtoOperation redoOperations = 1;
	repeated ProtoOperation undoOperations = 2;
}
